name: Benchmark Review Paths

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  deployments: write

jobs:
  benchmarks:
    name: Run review benchmarks
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Run CliExecutor benchmarks
        shell: cmd
        run: make benchmark BENCH_ARGS="--filter *CliExecutorBenchmarks* --exporters json"

      - name: Store CliExecutor benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Code Review - CliExecutor
          tool: 'benchmarkdotnet'
          output-file-path: Codescene.VSExtension.VS2022/BenchmarkDotNet.Artifacts/results/Codescene.VSExtension.Core.Benchmarks.CliExecutorBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

      - name: Run CodeReviewer benchmarks
        shell: cmd
        run: make benchmark BENCH_ARGS="--filter *CodeReviewerBenchmarks* --exporters json"

      - name: Store CodeReviewer benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Code Review - CodeReviewer
          tool: 'benchmarkdotnet'
          output-file-path: Codescene.VSExtension.VS2022/BenchmarkDotNet.Artifacts/results/Codescene.VSExtension.Core.Benchmarks.CodeReviewerBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

      - name: Run CachingCodeReviewer benchmarks
        shell: cmd
        run: make benchmark BENCH_ARGS="--filter *CachingCodeReviewerBenchmarks* --exporters json"

      - name: Store CachingCodeReviewer benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Code Review - CachingCodeReviewer
          tool: 'benchmarkdotnet'
          output-file-path: Codescene.VSExtension.VS2022/BenchmarkDotNet.Artifacts/results/Codescene.VSExtension.Core.Benchmarks.CachingCodeReviewerBenchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
